<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      (function() {
        // Suppress cross-origin frame access security errors
        window.addEventListener('error', function(event) {
          var msg = event.message || '';
          if (
            msg.includes('Blocked a frame with origin') ||
            msg.includes('cross-origin frame') ||
            msg.includes('SecurityError') ||
            msg.includes('Failed to read') ||
            msg.includes('ethereum')
          ) {
            try {
              event.preventDefault();
              event.stopPropagation();
            } catch (e) {}
            console.warn('Soft-suppressed iframe cross-origin error:', msg);
          }
        }, true);

        window.addEventListener('unhandledrejection', function(event) {
          var reasonMsg = (event.reason && event.reason.message) || '';
          if (
            reasonMsg.includes('Blocked a frame with origin') ||
            reasonMsg.includes('cross-origin frame') ||
            reasonMsg.includes('SecurityError') ||
            reasonMsg.includes('Failed to read') ||
            reasonMsg.includes('ethereum')
          ) {
            try {
              event.preventDefault();
              event.stopPropagation();
            } catch (e) {}
            console.warn('Soft-suppressed iframe cross-origin promise rejection:', reasonMsg);
          }
        }, true);

        try {
          var originalFetch = window.fetch;
          var currentFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return currentFetch;
            },
            set: function(val) {
              currentFetch = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Failed to patch window.fetch setter in index.html:", e);
        }

        // Cross-origin Frame property proxy (such as parent, top) to prevent frame origin security errors
        function isWindow(obj) {
          if (!obj) return false;
          try {
            return obj.window === obj;
          } catch (e) {
            return true; // Cross-origin Window
          }
        }

        function makeSafeFrameProxy(targetFrame) {
          if (!targetFrame) return targetFrame;
          try {
            var allowedProps = {
              window: true,
              self: true,
              postMessage: true,
              close: true,
              closed: true,
              focus: true,
              blur: true,
              frames: true,
              length: true,
              top: true,
              opener: true,
              parent: true,
              location: true
            };

            return new Proxy(targetFrame, {
              get: function(target, prop) {
                if (prop === '__isSafeFrameProxy') {
                  return true;
                }

                var isCrossOrigin = false;
                try {
                  var doc = target.document;
                } catch (err) {
                  isCrossOrigin = true;
                }

                var isIndex = typeof prop === 'string' && /^\d+$/.test(prop);

                if (isCrossOrigin && !isIndex && typeof prop === 'string' && !allowedProps[prop]) {
                  return undefined;
                }
                try {
                  var val = target[prop];
                  if (val === window.parent) return window.parent;
                  if (val === window.top) return window.top;
                  if (val === window) return window;
                  if (val && typeof val === 'object') {
                    if (val.__isSafeFrameProxy) {
                      return val;
                    }
                    if (isWindow(val)) {
                      return makeSafeFrameProxy(val);
                    }
                  }
                  return val;
                } catch (err) {
                  // Safely intercept and return undefined instead of throwing fatal cross-origin TypeErrors
                  return undefined;
                }
              },
              has: function(target, prop) {
                if (prop === '__isSafeFrameProxy') {
                  return true;
                }

                var isCrossOrigin = false;
                try {
                  var doc = target.document;
                } catch (err) {
                  isCrossOrigin = true;
                }

                var isIndex = typeof prop === 'string' && /^\d+$/.test(prop);

                if (isCrossOrigin && !isIndex && typeof prop === 'string' && !allowedProps[prop]) {
                  return false;
                }
                try {
                  return prop in target;
                } catch (err) {
                  return false;
                }
              }
            });
          } catch (e) {
            return targetFrame;
          }
        }

        function defineSafeProp(obj, propName, safeValue) {
          try {
            Object.defineProperty(obj, propName, {
              get: function() {
                return safeValue;
              },
              configurable: true,
              enumerable: true
            });
          } catch (e) {
            try {
              obj[propName] = safeValue;
            } catch (err) {}
          }
        }

        try {
          if (window.parent && window.parent !== window) {
            var safeParent = makeSafeFrameProxy(window.parent);
            defineSafeProp(window, 'parent', safeParent);
            if (window.Window && window.Window.prototype) {
              defineSafeProp(window.Window.prototype, 'parent', safeParent);
            }
          }
        } catch (e) {
          console.warn("Failed to redefine window.parent with safe proxy:", e);
        }

        try {
          if (window.top && window.top !== window) {
            var safeTop = makeSafeFrameProxy(window.top);
            defineSafeProp(window, 'top', safeTop);
            if (window.Window && window.Window.prototype) {
              defineSafeProp(window.Window.prototype, 'top', safeTop);
            }
          }
        } catch (e) {
          console.warn("Failed to redefine window.top with safe proxy:", e);
        }

        try {
          if (window.opener) {
            var safeOpener = makeSafeFrameProxy(window.opener);
            defineSafeProp(window, 'opener', safeOpener);
            if (window.Window && window.Window.prototype) {
              defineSafeProp(window.Window.prototype, 'opener', safeOpener);
            }
          }
        } catch (e) {
          console.warn("Failed to redefine window.opener with safe proxy:", e);
        }

        try {
          var safeFrames = makeSafeFrameProxy(window);
          defineSafeProp(window, 'frames', safeFrames);
          if (window.Window && window.Window.prototype) {
            defineSafeProp(window.Window.prototype, 'frames', safeFrames);
          }
        } catch (e) {
          console.warn("Failed to redefine window.frames with safe proxy:", e);
        }

        try {
          if (window.HTMLIFrameElement && window.HTMLIFrameElement.prototype) {
            var originalContentWindowGetter = Object.getOwnPropertyDescriptor(HTMLIFrameElement.prototype, 'contentWindow')?.get;
            if (originalContentWindowGetter) {
              Object.defineProperty(HTMLIFrameElement.prototype, 'contentWindow', {
                get: function() {
                  try {
                    var win = originalContentWindowGetter.call(this);
                    return makeSafeFrameProxy(win);
                  } catch (err) {
                    return undefined;
                  }
                },
                configurable: true,
                enumerable: true
              });
            }
          }
        } catch (e) {
          console.warn("Failed to redefine HTMLIFrameElement.prototype.contentWindow:", e);
        }

        try {
          if (window.MessageEvent && window.MessageEvent.prototype) {
            var originalSourceGetter = Object.getOwnPropertyDescriptor(MessageEvent.prototype, 'source')?.get;
            if (originalSourceGetter) {
              Object.defineProperty(MessageEvent.prototype, 'source', {
                get: function() {
                  try {
                    var src = originalSourceGetter.call(this);
                    return makeSafeFrameProxy(src);
                  } catch (err) {
                    return null;
                  }
                },
                configurable: true,
                enumerable: true
              });
            }
          }
        } catch (e) {
          console.warn("Failed to redefine MessageEvent.prototype.source:", e);
        }

        try {
          if (window.Window && window.Window.prototype) {
            for (var i = 0; i < 20; i++) {
              (function(idx) {
                Object.defineProperty(Window.prototype, idx, {
                  get: function() {
                    try {
                      var iframes = document.querySelectorAll('iframe');
                      if (iframes[idx]) {
                        return makeSafeFrameProxy(iframes[idx].contentWindow);
                      }
                    } catch (err) {}
                    return undefined;
                  },
                  configurable: true,
                  enumerable: true
                });
              })(i);
            }
          }
        } catch (e) {
          console.warn("Failed to define indexed properties on Window.prototype:", e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
