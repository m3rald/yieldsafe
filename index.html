<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      (function() {
        // Patch window.fetch safely to prevent "read-only property" or "only a getter" assignment errors
        try {
          var originalFetch = window.fetch;
          var currentFetch = originalFetch;
          function patchFetch(target) {
            try {
              Object.defineProperty(target, 'fetch', {
                get: function() {
                  return currentFetch;
                },
                set: function(val) {
                  currentFetch = val;
                },
                configurable: true,
                enumerable: true
              });
              return true;
            } catch (err) {
              return false;
            }
          }
          patchFetch(window);
          if (window.Window && window.Window.prototype) {
            patchFetch(window.Window.prototype);
          }
          if (window.__proto__) {
            patchFetch(window.__proto__);
          }
        } catch (e) {
          console.warn("Failed to patch window.fetch setter in index.html:", e);
        }

        // Assign window.onerror to suppress errors before they bubble to the browser console/host environment
        try {
          window.onerror = function(message, source, lineno, colno, error) {
            var msg = (message || '').toString();
            var errMsg = (error && error.message || '').toString();
            if (
              msg.includes('Blocked a frame with origin') ||
              msg.includes('cross-origin frame') ||
              msg.includes('SecurityError') ||
              msg.includes('Failed to read') ||
              msg.includes('ethereum') ||
              errMsg.includes('Blocked a frame with origin') ||
              errMsg.includes('cross-origin frame') ||
              errMsg.includes('SecurityError') ||
              errMsg.includes('Failed to read') ||
              errMsg.includes('ethereum')
            ) {
              console.warn('Soft-suppressed window.onerror:', msg || errMsg);
              return true; // Suppress reporting to the host
            }
          };
        } catch (e) {
          console.warn('Failed to define window.onerror:', e);
        }

        // Suppress cross-origin frame access security errors
        window.addEventListener('error', function(event) {
          var msg = (event.message || '').toString();
          var errMsg = (event.error && event.error.message || '').toString();
          if (
            msg.includes('Blocked a frame with origin') ||
            msg.includes('cross-origin frame') ||
            msg.includes('SecurityError') ||
            msg.includes('Failed to read') ||
            msg.includes('ethereum') ||
            errMsg.includes('Blocked a frame with origin') ||
            errMsg.includes('cross-origin frame') ||
            errMsg.includes('SecurityError') ||
            errMsg.includes('Failed to read') ||
            errMsg.includes('ethereum')
          ) {
            try {
              event.preventDefault();
              event.stopPropagation();
            } catch (e) {}
            console.warn('Soft-suppressed iframe cross-origin error:', msg || errMsg);
          }
        }, true);

        window.addEventListener('unhandledrejection', function(event) {
          var reasonMsg = (event.reason && (event.reason.message || event.reason.toString()) || '').toString();
          if (
            reasonMsg.includes('Blocked a frame with origin') ||
            reasonMsg.includes('cross-origin frame') ||
            reasonMsg.includes('SecurityError') ||
            reasonMsg.includes('Failed to read') ||
            reasonMsg.includes('ethereum')
          ) {
            try {
              event.preventDefault();
              event.stopPropagation();
            } catch (e) {}
            console.warn('Soft-suppressed iframe cross-origin promise rejection:', reasonMsg);
          }
        }, true);

        // Cross-origin Frame property proxy (such as parent, top) to prevent frame origin security errors
        function isWindow(obj) {
          if (!obj) return false;
          try {
            return obj.window === obj;
          } catch (e) {
            return true; // Cross-origin Window
          }
        }

        function makeSafeFrameProxy(targetFrame) {
          if (!targetFrame) return targetFrame;
          try {
            var allowedProps = {
              window: true,
              self: true,
              postMessage: true,
              close: true,
              closed: true,
              focus: true,
              blur: true,
              frames: true,
              length: true,
              top: true,
              opener: true,
              parent: true,
              location: true
            };

            return new Proxy(targetFrame, {
              get: function(target, prop) {
                if (prop === '__isSafeFrameProxy') {
                  return true;
                }

                var isCrossOrigin = false;
                try {
                  var doc = target.document;
                } catch (err) {
                  isCrossOrigin = true;
                }

                if (isCrossOrigin) {
                  if (typeof prop !== 'string') {
                    return undefined;
                  }
                  var isIndex = /^\d+$/.test(prop);
                  if (!isIndex && !allowedProps[prop]) {
                    return undefined;
                  }
                }

                try {
                  var val = target[prop];
                  if (val === window.parent) return window.parent;
                  if (val === window.top) return window.top;
                  if (val === window) return window;
                  if (val && typeof val === 'object') {
                    if (val.__isSafeFrameProxy) {
                      return val;
                    }
                    if (isWindow(val)) {
                      return makeSafeFrameProxy(val);
                    }
                  }
                  return val;
                } catch (err) {
                  // Safely intercept and return undefined instead of throwing fatal cross-origin TypeErrors
                  return undefined;
                }
              },
              has: function(target, prop) {
                if (prop === '__isSafeFrameProxy') {
                  return true;
                }

                var isCrossOrigin = false;
                try {
                  var doc = target.document;
                } catch (err) {
                  isCrossOrigin = true;
                }

                if (isCrossOrigin) {
                  if (typeof prop !== 'string') {
                    return false;
                  }
                  var isIndex = /^\d+$/.test(prop);
                  if (!isIndex && !allowedProps[prop]) {
                    return false;
                  }
                }

                try {
                  return prop in target;
                } catch (err) {
                  return false;
                }
              }
            });
          } catch (e) {
            return targetFrame;
          }
        }

        function defineSafeProp(obj, propName, safeValue) {
          try {
            Object.defineProperty(obj, propName, {
              get: function() {
                return safeValue;
              },
              configurable: true,
              enumerable: true
            });
          } catch (e) {
            try {
              obj[propName] = safeValue;
            } catch (err) {}
          }
        }

        // Redefine window.parent safely
        try {
          if (window.parent && window.parent !== window) {
            var safeParent = makeSafeFrameProxy(window.parent);
            if (window.Window && window.Window.prototype) {
              defineSafeProp(window.Window.prototype, 'parent', safeParent);
            }
            defineSafeProp(window, 'parent', safeParent);
          }
        } catch (e) {
          console.warn("Failed to redefine window.parent with safe proxy:", e);
        }

        // Redefine window.top safely
        try {
          if (window.top && window.top !== window) {
            var safeTop = makeSafeFrameProxy(window.top);
            if (window.Window && window.Window.prototype) {
              defineSafeProp(window.Window.prototype, 'top', safeTop);
            }
            defineSafeProp(window, 'top', safeTop);
          }
        } catch (e) {
          console.warn("Failed to redefine window.top with safe proxy:", e);
        }

        // Redefine window.opener safely
        try {
          if (window.opener) {
            var safeOpener = makeSafeFrameProxy(window.opener);
            if (window.Window && window.Window.prototype) {
              defineSafeProp(window.Window.prototype, 'opener', safeOpener);
            }
            defineSafeProp(window, 'opener', safeOpener);
          }
        } catch (e) {
          console.warn("Failed to redefine window.opener with safe proxy:", e);
        }

        // Redefine window.frames safely
        try {
          var safeFrames = makeSafeFrameProxy(window);
          if (window.Window && window.Window.prototype) {
            defineSafeProp(window.Window.prototype, 'frames', safeFrames);
          }
          defineSafeProp(window, 'frames', safeFrames);
        } catch (e) {
          console.warn("Failed to redefine window.frames with safe proxy:", e);
        }

        try {
          if (window.HTMLIFrameElement && window.HTMLIFrameElement.prototype) {
            var originalContentWindowGetter = Object.getOwnPropertyDescriptor(HTMLIFrameElement.prototype, 'contentWindow')?.get;
            if (originalContentWindowGetter) {
              Object.defineProperty(HTMLIFrameElement.prototype, 'contentWindow', {
                get: function() {
                  try {
                    var win = originalContentWindowGetter.call(this);
                    if (win) {
                      // Dynamically patch same-origin iframe's parent and top
                      try {
                        if (win.parent && win.parent !== win) {
                          var safeParent = makeSafeFrameProxy(win.parent);
                          if (win.Window && win.Window.prototype) {
                            defineSafeProp(win.Window.prototype, 'parent', safeParent);
                          }
                          defineSafeProp(win, 'parent', safeParent);
                        }
                      } catch (e) {}
                      try {
                        if (win.top && win.top !== win) {
                          var safeTop = makeSafeFrameProxy(win.top);
                          if (win.Window && win.Window.prototype) {
                            defineSafeProp(win.Window.prototype, 'top', safeTop);
                          }
                          defineSafeProp(win, 'top', safeTop);
                        }
                      } catch (e) {}
                      // Add error listeners to same-origin iframe window
                      try {
                        win.onerror = function(message, source, lineno, colno, error) {
                          var msg = (message || '').toString();
                          var errMsg = (error && error.message || '').toString();
                          if (
                            msg.includes('Blocked a frame with origin') ||
                            msg.includes('cross-origin frame') ||
                            msg.includes('SecurityError') ||
                            msg.includes('Failed to read') ||
                            msg.includes('ethereum') ||
                            errMsg.includes('Blocked a frame with origin') ||
                            errMsg.includes('cross-origin frame') ||
                            errMsg.includes('SecurityError') ||
                            errMsg.includes('Failed to read') ||
                            errMsg.includes('ethereum')
                          ) {
                            console.warn('Soft-suppressed iframe onerror:', msg || errMsg);
                            return true;
                          }
                        };
                        win.addEventListener('error', function(event) {
                          var msg = (event.message || '').toString();
                          var errMsg = (event.error && event.error.message || '').toString();
                          if (
                            msg.includes('Blocked a frame with origin') ||
                            msg.includes('cross-origin frame') ||
                            msg.includes('SecurityError') ||
                            msg.includes('Failed to read') ||
                            msg.includes('ethereum') ||
                            errMsg.includes('Blocked a frame with origin') ||
                            errMsg.includes('cross-origin frame') ||
                            errMsg.includes('SecurityError') ||
                            errMsg.includes('Failed to read') ||
                            errMsg.includes('ethereum')
                          ) {
                            try {
                              event.preventDefault();
                              event.stopPropagation();
                            } catch (e) {}
                            console.warn('Soft-suppressed iframe error listener:', msg || errMsg);
                          }
                        }, true);
                      } catch (e) {}
                    }
                    return makeSafeFrameProxy(win);
                  } catch (err) {
                    return undefined;
                  }
                },
                configurable: true,
                enumerable: true
              });
            }
          }
        } catch (e) {
          console.warn("Failed to redefine HTMLIFrameElement.prototype.contentWindow:", e);
        }

        try {
          if (window.MessageEvent && window.MessageEvent.prototype) {
            var originalSourceGetter = Object.getOwnPropertyDescriptor(MessageEvent.prototype, 'source')?.get;
            if (originalSourceGetter) {
              Object.defineProperty(MessageEvent.prototype, 'source', {
                get: function() {
                  try {
                    var src = originalSourceGetter.call(this);
                    return makeSafeFrameProxy(src);
                  } catch (err) {
                    return null;
                  }
                },
                configurable: true,
                enumerable: true
              });
            }
          }
        } catch (e) {
          console.warn("Failed to redefine MessageEvent.prototype.source:", e);
        }

        try {
          if (window.Window && window.Window.prototype) {
            for (var i = 0; i < 20; i++) {
              (function(idx) {
                Object.defineProperty(Window.prototype, idx, {
                  get: function() {
                    try {
                      var iframes = document.querySelectorAll('iframe');
                      if (iframes[idx]) {
                        return makeSafeFrameProxy(iframes[idx].contentWindow);
                      }
                    } catch (err) {}
                    return undefined;
                  },
                  configurable: true,
                  enumerable: true
                });
              })(i);
            }
          }
        } catch (e) {
          console.warn("Failed to define indexed properties on Window.prototype:", e);
        }
      })();
    </script>
